name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  detect-project:
    name: Detect Project Type
    runs-on: ubuntu-latest
    outputs:
      has_java: ${{ steps.detect.outputs.has_java }}
      has_node: ${{ steps.detect.outputs.has_node }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect files
        id: detect
        run: |
          if [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            echo "has_java=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_java=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "package.json" ]; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
          fi

  harness-governance:
    name: Harness Governance
    runs-on: ubuntu-latest
    needs: detect-project
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Health check
        run: bash scripts/health-check.sh
      - name: Memory governance check
        run: bash scripts/validate-memory.sh
      - name: Drift check
        run: bash scripts/scan-drift.sh
      - name: CLI smoke test
        run: bash scripts/smoke-test.sh

  harness-cross-platform:
    name: Harness Cross-Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Run harness unit tests
        run: npm test

      - name: Run L5 soak simulation
        run: npm run test:soak

      - name: Run Unix smoke test
        if: runner.os != 'Windows'
        run: bash scripts/smoke-test.sh

      - name: Run Windows smoke test
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/smoke-test.ps1

  # ──────────────────────────────────────────
  # Java / Gradle 프로젝트 감지 시 실행
  # ──────────────────────────────────────────
  java-ci:
    name: Java CI (Gradle)
    runs-on: ubuntu-latest
    needs: detect-project
    if: ${{ needs.detect-project.outputs.has_java == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests & coverage
        run: |
          ./gradlew test
          if grep -q "jacoco" build.gradle* 2>/dev/null; then
            ./gradlew jacocoTestCoverageVerification
          fi

      - name: Build
        run: ./gradlew build -x test

  # ──────────────────────────────────────────
  # Node.js / 프론트엔드 프로젝트 감지 시 실행
  # ──────────────────────────────────────────
  node-ci:
    name: Node CI (npm)
    runs-on: ubuntu-latest
    needs: detect-project
    if: ${{ needs.detect-project.outputs.has_node == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests & coverage
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.coverage?0:1)"; then
            npm run coverage
          elif node -e "const s=require('./package.json').scripts||{}; process.exit(s.test?0:1)"; then
            npm run test
          else
            echo "No test script found. Skipping tests."
          fi

      - name: Lint
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.lint?0:1)"; then
            npm run lint
          else
            echo "No lint script found. Skipping lint."
          fi

      - name: Build
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.build?0:1)"; then
            npm run build
          else
            echo "No build script found. Skipping build."
          fi

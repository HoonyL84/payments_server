spring:
  datasource:
    url: ${PAYMENTS_DB_URL:jdbc:mysql://localhost:3306/payments?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${PAYMENTS_DB_USERNAME:payments}
    password: ${PAYMENTS_DB_PASSWORD:payments}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379

spring:
  datasource:
    url: jdbc:h2:mem:payment_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379
